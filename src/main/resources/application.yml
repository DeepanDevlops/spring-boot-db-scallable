server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:6432/db-scalable
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 2000
      max-lifetime: 1800000
      pool-name: db-scalable

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        jdbc:
          batch_size: 100
          fetch_size: 100

        order_inserts: true
        order_updates: true
        generate_statistics: false

logging:
  level:
    org.hibernate.SQL: ERROR
    com.zaxxer.hikari: INFO